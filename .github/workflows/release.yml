name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run build

      # Package the drop-in module folder: built JS/CSS + manifest + i18n.
      - name: Assemble module.zip
        run: |
          cd dist
          zip -r ../module.zip .
          cd ..

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            module.json
            module.zip
