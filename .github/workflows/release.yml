name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # The tag (vX.Y.Z) is the source of the release version: stamp it into
      # package.json so the build bakes it into dist/module.json, keeping the
      # published manifest, the zip, and the tag in lockstep.
      - name: Set version from tag
        run: npm version --no-git-tag-version --allow-same-version "${GITHUB_REF_NAME#v}"

      - run: npm run lint
      - run: npm run test
      - run: npm run build

      # Package the drop-in module folder: built JS/CSS + manifest + i18n.
      # Exclude sourcemaps so they don't ship to end users.
      - name: Assemble module.zip
        run: |
          cd dist
          zip -r ../module.zip . -x '*.map'
          cd ..

      # Use the curated changelog entry as the GitHub release body. Failing here
      # keeps a tag with missing release notes from producing a half-finished release.
      - name: Prepare release notes
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v heading="## [$version]" '
            index($0, heading) == 1 { found = 1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          grep -q '^### ' release-notes.md

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: Table Companion ${{ github.ref_name }}
          body_path: release-notes.md
          fail_on_unmatched_files: true
          make_latest: true
          # Publish the built manifest (version stamped from the tag), not the
          # repo copy — they share everything but the version.
          files: |
            dist/module.json
            module.zip
